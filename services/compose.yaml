services:
  swag:
    image: lscr.io/linuxserver/swag:latest
    container_name: swag
    env_file: ".env"
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - URL=${URL}
      - VALIDATION=http
      #- SUBDOMAINS=www, #optional
      #- CERTPROVIDER= # optional, default is Lets Encrypt
      #- DNSPLUGIN=cloudflare #optional
      #- PROPAGATION= #optional
      #- EMAIL= #optional
      #- ONLY_SUBDOMAINS=false #optional
      #- EXTRA_DOMAINS= #optional
      #- STAGING=false #optional
      #- DISABLE_F2B= #optional
      #- SWAG_AUTORELOAD= #optional
      #- SWAG_AUTORELOAD_WATCHLIST= #optional
    volumes:
      - ./conf/swag/conf:/config
    ports:
      - 443:443
      - 80:80 #optional
    restart: unless-stopped

  sqlite:
    build:
      context: ./db
    container_name: sqlite
    env_file: ".env"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      # Persists database files in ./conf/db on the host.
      # Other services (like Postfix) should also mount this.
      - ./conf/db:/db
    # This command just keeps the container running. This service's purpose
    # is to manage the database volume, which other services will use.
    command: tail -f /dev/null
    restart: unless-stopped

