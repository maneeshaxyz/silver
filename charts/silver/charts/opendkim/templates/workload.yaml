apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "opendkim.fullname" . }}
  labels:
    {{- include "opendkim.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "opendkim.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "opendkim.selectorLabels" . | nindent 6 }}
  {{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: keys
        labels:
          {{- include "opendkim.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "opendkim.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-opendkim.yaml") . | sha256sum }}
        checksum/tables: {{ include (print $.Template.BasePath "/configmap-tables.yaml") . | sha256sum }}
        checksum/silver: {{ include (print $.Template.BasePath "/secret-silver.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "opendkim.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: opendkim
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: opendkim
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: opendkim
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            tcpSocket:
              port: opendkim
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          volumeMounts:
            - name: silver-secret
              mountPath: /etc/opendkim/silver.yaml
              subPath: silver.yaml
              readOnly: true
            - name: config
              mountPath: /etc/opendkim/opendkim.conf
              subPath: opendkim.conf
              readOnly: true
            - name: tables
              mountPath: /etc/opendkim/KeyTable
              subPath: KeyTable
              readOnly: true
            - name: tables
              mountPath: /etc/opendkim/SigningTable
              subPath: SigningTable
              readOnly: true
            - name: tables
              mountPath: /etc/opendkim/TrustedHosts
              subPath: TrustedHosts
              readOnly: true
            - name: keys
              mountPath: /etc/dkimkeys
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: silver-secret
          secret:
            secretName: {{ include "opendkim.fullname" . }}-silver
        - name: config
          configMap:
            name: {{ include "opendkim.fullname" . }}-config
        - name: tables
          configMap:
            name: {{ include "opendkim.fullname" . }}-tables
        {{- if and .Values.persistence.enabled .Values.persistence.existingClaim }}
        - name: keys
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
        {{- else if not .Values.persistence.enabled }}
        - name: keys
          emptyDir: {}
        {{- end }}
